# The Inverted Stack — galley/prose book profile.
#
# First-customer profile. Anna-voice calibration. Phase 1 establishes
# the file and the schema mapping; full Anna decoupling (lifting motif
# lists, filter-words, stopwords from handcount's hardcoded constants
# into this yaml) lands in Phase 4 per galley/prose/ROADMAP.md.
#
# Until Phase 4: handcount continues to use its hardcoded constants and
# this profile is consulted only for the few values already wired
# (book_id, voice, compute config, held_lines_dir).

book_id: the-inverted-stack
voice: anna
genre: literary-sf
held_lines_dir: vol-2/act-1

# Compute routing — fully local by default. The-inverted-stack does not
# currently use any remote GPU backend; opt-in by setting remote_base_url
# to the user's own server. Per ADR-0007 (Sunfish local-first commitments).
compute:
  cpu_workers: 4
  gpu_mode: auto
  gpu_local_device: null
  remote_base_url: null
  remote_auth_token_env: GALLEY_API_TOKEN
  remote_timeout_seconds: 30
  cache_dir: "~/.galley/cache/prose"

# Detector overrides — Phase 4 lifts the Anna-calibrated lists out of
# handcount's hardcoded constants and into this profile. The legacy
# handcount script keeps its constants for backward compatibility; the
# galley/prose `voice/` detector pack reads from the lists below.
#
# Lists are exact extractions from build/prose_telemetry_handcount.py:
#   filter_words            ← _FILTER_VERBS regex group (verbatim)
#   motif_overuse.motifs    ← CAPPED_MOTIFS (cap=1 per ANNA-VOICE.md)
#   motif_overuse.retired   ← RETIRED_MOTIFS (any occurrence = blocker)
#   self_referential_frame  ← _FRAME_PATTERNS regex alternation

detectors:
  filter_words:
    enabled: true
    # Narrator-distance verbs. Match form: "I <verb>".
    filter_words:
      - felt
      - saw
      - noticed
      - realized
      - realised
      - registered
      - observed
      - watched
      - sensed
      - thought
      - wondered
      - considered
      - recognized
      - recognised
      - understood
      - knew
      - believed
      - imagined
      - remembered
      - recalled
      - experienced
      - perceived
      - decided
      - figured
      - determined
    # Density thresholds (per 1k tokens). Tuned for Anna's chapters.
    warning_per_1k: 8.0
    blocker_per_1k: 15.0

  motif_overuse:
    enabled: true
    # Phrases that should never appear (any occurrence = finding).
    retired_motifs:
      - what it claimed to be
      - what they claimed to be
      - what he claimed to be
      - what she claimed to be
    # Phrases capped at N per chapter (occurrences past N = findings).
    # Cap = 1: appears at most once per chapter; more = warning/blocker.
    motifs:
      "noted and did not yet": 1
      "I am writing this here": 1
      "I am going to tell you": 1
      "I am going to write": 1
      "in this account": 1
      "the smallest possible": 1
      "this version of the account": 1
      "I am leaving it in": 1

  self_referential_frame:
    enabled: true
    # Staff-history meta-frame phrases. Per ANNA-VOICE.md anti-pattern
    # #6, capped at one occurrence per chapter at the verdict layer
    # (handled outside this list).
    self_referential_frames:
      - I am writing this here
      - I am going to write
      - I am going to tell you
      - in this account
      - the staff history
      - for the record
      - on the record
      - in retrospect
      - this version of the account
      - I am leaving it in
      - I am leaving the reading in
    warning_raw_count: 2
    blocker_raw_count: 4

  # Lexical-chain stopwords — used by the upcoming galley/prose lexical
  # chain detector (Phase 5+). Currently consumed only by the legacy
  # handcount detector; populated here so the migration is one step.
  lexical_chain_loop:
    enabled: true
    stopwords:
      - consortium
      - architecture
      - mission
      - protocol
      - system
