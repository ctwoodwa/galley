#     warning_per_1k: 8
#     blocker_per_1k: 15
#   self_referential_frame:
#     self_referential_frames:
#       - "I am telling you"
#       - "I am writing this"
#     warning_raw_count: 1
#     blocker_raw_count: 2
detectors: {}
